<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private Profile</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, rgba(255, 126, 95, 0.8), rgba(254, 180, 123, 0.8), rgba(255, 107, 107, 0.8), rgba(255, 215, 0, 0.8));
      background-size: 200% 200%;
      animation: gradientBackground 8s ease infinite;
      margin: 0;
    }

    @keyframes gradientBackground {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      animation: fadeIn 1s ease-out;
      position: relative;
    }

    .notification {
      margin-bottom: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 16px;
      text-align: center;
    }

    .linkField {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      color: #000;
      text-align: center;
      margin-bottom: 15px;
      user-select: all;
    }

    .copyButton {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 123, 255, 0.8);
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .copyButton:hover {
      background: rgba(0, 123, 255, 1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="notification" id="notification">
      Copy the link and paste it into your browser.
    </div>
    <div class="linkField" id="linkField">
      http://findinglove.kesug.com/yyy
    </div>
    <button class="copyButton" id="copyButton">
      Copy
    </button>
  </div>

  <script>
    function getParameterByName(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    const linkCode = getParameterByName('s');
    const baseURL = '';
    const linkField = document.getElementById('linkField');
    const copyButton = document.getElementById('copyButton');
    const notification = document.getElementById('notification');

    let fullLink = 'http://findinglove.kesug.com/yyy';  // Default link

    if (linkCode) {
      fullLink = baseURL + linkCode;
      linkField.textContent = fullLink;
    }

    copyButton.addEventListener('click', () => {
      navigator.clipboard.writeText(fullLink).then(() => {
        notification.textContent = 'Great! ✅ Successfully copied to the clipboard.Now paste it into your browser and continue.';
        notification.style.backgroundColor = '#4169E1';
      }).catch(err => {
        notification.textContent = 'Failed to copy. Please copy manually.';
        notification.style.backgroundColor = 'rgba(200, 0, 0, 0.8)';
      });
    });
  </script>
</body>
  </html>
